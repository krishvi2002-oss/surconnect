<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurConnect</title>

<link rel="stylesheet" href="./style.css">
</head>

<body>

<header class="navbar">

  <div class="logo">
    <h2>🎵 SurConnect</h2>
  </div>

  <div class="search-box">
    <input type="text" id="search" placeholder="Search artists...">
  </div>

  <div class="join-btn">
    <button onclick="window.open('https://forms.gle/ZZ5S2uDN1RLvNRnj7','_blank')">
      Join Now
    </button>
  </div>

</header>

<!-- FILTERS -->
<div class="filters">
  <button onclick="filterRole('All')">All</button>
  <button onclick="filterRole('Singer')">Singer</button>
  <button onclick="filterRole('Rapper')">Rapper</button>
  <button onclick="filterRole('Music Producer')">Producer</button>
  <button onclick="filterRole('Lyricist')">Lyricist</button>
</div>

<section class="hero">
  <h1>Find Music Partners</h1>
  <p>Connect with Singers, Rappers, Producers & Lyricists.</p>
</section>

<section class="members" id="members"></section>

<script src="./script.js"></script>

</body>
</html>
